<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Market Report</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .timestamp { color: #888; font-size: 1.1rem; }
        .loading {
            text-align: center;
            padding: 100px;
            font-size: 1.5rem;
            color: #00d4ff;
        }
        .error {
            text-align: center;
            padding: 100px;
            color: #ff4757;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #00d4ff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        th { color: #888; font-weight: 500; font-size: 0.9rem; }
        .positive { color: #00ff88; }
        .negative { color: #ff4757; }
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,212,255,0.3);
        }
        .refresh-btn:hover { transform: scale(1.05); }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .countdown {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Live Crypto Market Report</h1>
            <p class="timestamp" id="lastUpdate">Loading...</p>
        </header>
        <div id="content">
            <div class="loading">⏳ Fetching live data from CoinGecko...</div>
        </div>
    </div>
    
    <div class="countdown" id="countdown">Auto-refresh in: 30s</div>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchData()">🔄 Refresh Now</button>

    <script>
        const COINGECKO_API = 'https://api.coingecko.com/api/v3';
        let countdown = 30;
        let countdownInterval;

        async function fetchData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            document.getElementById('content').innerHTML = '<div class="loading">⏳ Fetching live data...</div>';
            
            try {
                // Fetch all data in parallel
                const [globalRes, coinsRes] = await Promise.all([
                    fetch(`${COINGECKO_API}/global`),
                    fetch(`${COINGECKO_API}/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false&price_change_percentage=24h`)
                ]);
                
                const globalData = await globalRes.json();
                const coinsData = await coinsRes.json();
                
                renderReport(globalData.data, coinsData);
                document.getElementById('lastUpdate').textContent = `Last updated: ${new Date().toLocaleString('en-US', {timeZone: 'Asia/Shanghai'})} GMT+8`;
                
                // Reset countdown
                countdown = 30;
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        ❌ Error fetching data: ${error.message}<br><br>
                        CoinGecko API may be rate limited. Please wait a minute and try again.
                    </div>
                `;
            } finally {
                btn.disabled = false;
            }
        }

        function formatNumber(num) {
            if (num >= 1e12) return `$${(num/1e12).toFixed(2)}T`;
            if (num >= 1e9) return `$${(num/1e9).toFixed(2)}B`;
            if (num >= 1e6) return `$${(num/1e6).toFixed(2)}M`;
            return `$${num.toLocaleString()}`;
        }

        function renderReport(globalData, coins) {
            const totalMcap = globalData.total_market_cap?.usd || 0;
            const mcapChange = globalData.market_cap_change_percentage_24h_usd || 0;
            const btcDominance = globalData.market_cap_percentage?.btc || 0;
            const volume = globalData.total_volume?.usd || 0;
            
            // Sort for gainers/losers
            const sorted = [...coins].sort((a, b) => (b.price_change_percentage_24h || 0) - (a.price_change_percentage_24h || 0));
            const gainers = sorted.slice(0, 10);
            const losers = sorted.slice(-10).reverse();
            
            let html = `
                <div class="grid">
                    <div class="card">
                        <h2>🏛️ Market Overview</h2>
                        <table>
                            <tr><td>Total Market Cap</td><td>${formatNumber(totalMcap)}</td></tr>
                            <tr><td>24h Change</td><td class="${mcapChange > 0 ? 'positive' : 'negative'}">${mcapChange > 0 ? '+' : ''}${mcapChange.toFixed(2)}%</td></tr>
                            <tr><td>24h Volume</td><td>${formatNumber(volume)}</td></tr>
                            <tr><td>BTC Dominance</td><td>${btcDominance.toFixed(1)}%</td></tr>
                        </table>
                    </div>
                    
                    <div class="card">
                        <h2>🏆 Top 10 Gainers (24h)</h2>
                        <table>
                            <thead><tr><th>#</th><th>Coin</th><th>Price</th><th>Change</th></tr></thead>
                            <tbody>
                                ${gainers.map((c, i) => `
                                    <tr>
                                        <td>${i+1}</td>
                                        <td>${c.symbol.toUpperCase()}</td>
                                        <td>$${c.current_price?.toLocaleString() || 'N/A'}</td>
                                        <td class="positive">+${c.price_change_percentage_24h?.toFixed(2) || 0}%</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="card">
                        <h2>💔 Top 10 Losers (24h)</h2>
                        <table>
                            <thead><tr><th>#</th><th>Coin</th><th>Price</th><th>Change</th></tr></thead>
                            <tbody>
                                ${losers.map((c, i) => `
                                    <tr>
                                        <td>${i+1}</td>
                                        <td>${c.symbol.toUpperCase()}</td>
                                        <td>$${c.current_price?.toLocaleString() || 'N/A'}</td>
                                        <td class="negative">${c.price_change_percentage_24h?.toFixed(2) || 0}%</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div class="card" style="grid-column: 1 / -1;">
                    <h2>📊 Top 100 Cryptocurrencies</h2>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr><th>#</th><th>Coin</th><th>Price</th><th>Market Cap</th><th>24h Volume</th><th>24h Change</th></tr>
                            </thead>
                            <tbody>
                                ${coins.map((c, i) => `
                                    <tr>
                                        <td>${i+1}</td>
                                        <td><img src="${c.image}" style="width:20px;height:20px;vertical-align:middle;margin-right:8px;border-radius:50%">${c.symbol.toUpperCase()}</td>
                                        <td>$${c.current_price?.toLocaleString() || 'N/A'}</td>
                                        <td>${formatNumber(c.market_cap || 0)}</td>
                                        <td>${formatNumber(c.total_volume || 0)}</td>
                                        <td class="${(c.price_change_percentage_24h || 0) > 0 ? 'positive' : 'negative'}">${c.price_change_percentage_24h?.toFixed(2) || 0}%</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            document.getElementById('content').innerHTML = html;
        }

        // Countdown timer
        function startCountdown() {
            countdownInterval = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = `Auto-refresh in: ${countdown}s`;
                if (countdown <= 0) {
                    fetchData();
                }
            }, 1000);
        }

        // Initial load
        fetchData();
        startCountdown();
    </script>
</body>
</html>
